        }

        .blob-1 {
            background: #dcfce7; 
            top: -100px;
            left: -100px;

        }

            background: #ccfbf1; 
            bottom: -150px;
            right: -100px;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .blob-3 {
            background: #f0fdf4;
            top: 40%;
            left: 30%;
            width: 400px;
            height: 400px;
            animation-duration: 30s;
            animation-delay: -10s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

      if(Array.isArray(a[k])||Array.isArray(b[k])) out[k]=uniq((a[k]||[]).concat(b[k]||[]));
      else out[k]=b[k]||a[k];
    }
    return out;
  }

    body.appendChild(tl);
    var w=document.createElement('div');w.className='bubble narr';w.style.maxWidth='100%';w.textContent=personaSummary();body.appendChild(w);
    var L=document.createElement('div');L.className='letter';L.innerHTML=buildLetter()+'<div class="sign">—— 十年后的'+he()+'</div>';body.appendChild(L);
    show('screen-end');document.getElementById('screen-end').querySelector('.feed').scrollTop=0;
  }
  function personaSummary(){ var p=S.p,traits=[];
    traits.push(p.social>=1?"外向、热闹":p.social<=-1?"安静、内秀":"温和");
    traits.push(p.grit>=1?"自律能扛":p.grit<=-1?"随性散漫":"努力得不动声色");
    traits.push(p.risk>=1?"敢闯":p.risk<=-1?"求稳":"谨慎而灵活");
    var motives=[];
    if(pref("ambition")>=2) motives.push("想往上走");
    if(pref("security")>=2) motives.push("很在意安稳");
    if(pref("meaning")>=2) motives.push("需要意义感");
    if(pref("money")>=2) motives.push("早早懂得现实压力");
    if(pref("freedom")>=2) motives.push("不愿被标准答案困住");
    if(pref("belonging")>=2) motives.push("珍惜关系与同行的人");
    var mtext=motives.length?("，也"+motives.join("、")):"";
    return say('sum',["回头看这条 IF 线："+he()+"是个"+traits.join("、")+"的人"+(S.talentLabel?("，"+S.talentLabel):"")+mtext+"。"+S.era.label+"的际遇，加上"+S.school.name+"的"+S.school.vibe+"，把"+he()+"塑造成了现在的样子——"+(S.outcome||"一个独一无二的你")+"。这不是预测，只是无数种可能里，温柔的一种。"]);
  }
  function memoryLine(text){ text=String(text||"").trim(); if(!text) return "对了，多年以后，我还是会想起那段校园日子。"; if(/[。！？!?]$/.test(text)) return "对了，多年以后，我还是会想起这件事："+text; return "对了，还记得"+text+"吗？"; }
  function buildLetter(){ var sc=S.school,cb=schoolPick("hiddenDetails",pick(sc.scenes)),food=schoolPick("foodMemory"),cat=outcomeCat(),good=S.stats.wellbeing>=50;
    var open=say('lt_open',["此刻的你，大概正为'选哪条路'而失眠吧。我想告诉你：别怕。","我知道你现在很焦虑，关于未来，关于'万一选错了怎么办'。"]);
    var mid = cat==="up"? say('lt_up',["后来的我走到了一个还不错的地方。但那不是因为我多聪明，而是因为你在"+sc.name+"那几年，没有放弃自己。"])
      : cat==="rough"? say('lt_rough',["路没有想象中顺，我摔过跤、绕过远路。可正是那些'不顺'，把我磨成了一个更结实的人。所以就算前面有坎，也请你大胆走。"])
      : say('lt_ord',["我没变成什么了不起的人物，过着普通却安稳的日子。但我想说——平凡不是失败，把自己的生活过好，本身就很了不起。"]);
    var close=memoryLine(cb)+(food?(" 也会想起"+food+"。"):"")+"后来，我偶尔还会梦到那里。"+(good?"谢谢你当年的每一个选择。":"谢谢你撑过了那些难熬的日子。")+"无论你最后选哪条路，都会有一个我，在路的尽头等你，并且为你骄傲。";
    return open+" "+mid+" "+close;
  }

  /* ---------- 哲思与荐书（小众优先；对症当下困境） ---------- */
  var QUOTES={
    up:[["越是从容，越走得远。","——蒙田"],["生活只能向后理解，但必须向前度过。","——克尔凯郭尔"]],
    rough:[["困扰人的不是事物本身，而是人对它的看法。","——爱比克泰德"],["不嘲笑，不悲叹，不诅咒，只求理解。","——斯宾诺莎"]],
    ordinary:[["人类几乎所有的不幸，都源于不能独自安静地待在房间里。","——帕斯卡"],["我经历过许多可怕的事，其中大多数从未真正发生。","——蒙田"]]
  };
  var BOOKS={
    up:["《心流》— 米哈里·契克森米哈赖：把全力以赴的状态，变成可复制的能力。"],
    rough:["《活出生命的意义》— 维克多·弗兰克尔：当一切都被夺走，人依然能选择如何面对。"],
    ordinary:["《被讨厌的勇气》— 岸见一郎：你的人生，不必活在别人的期待里。"]
  };
  function pickQuote(){ var c=outcomeCat();var arr=QUOTES[c]||QUOTES.ordinary;return arr[Math.floor(Math.random()*arr.length)]; }
  function pickBook(){ var c=outcomeCat();var arr=BOOKS[c]||BOOKS.ordinary;return arr[Math.floor(Math.random()*arr.length)]; }

  /* ---------- 分享海报（Canvas + 离线二维码） ---------- */
  function wrapText(ctx,text,x,y,maxW,lh){ var chars=text.split(''),line='',yy=y;
    for(var i=0;i<chars.length;i++){ var test=line+chars[i];
      if(ctx.measureText(test).width>maxW&&line){ ctx.fillText(line,x,yy);line=chars[i];yy+=lh; } else line=test; }
    if(line)ctx.fillText(line,x,yy); return yy; }
  function drawQR(ctx,text,x0,y0,size){ try{ var qr=qrcode(0,'M');qr.addData(text);qr.make();var n=qr.getModuleCount(),cell=size/n;
      ctx.fillStyle='#ffffff';ctx.fillRect(x0-10,y0-10,size+20,size+20);ctx.fillStyle='#073a6f';
      for(var r=0;r<n;r++)for(var c=0;c<n;c++){ if(qr.isDark(r,c))ctx.fillRect(Math.floor(x0+c*cell),Math.floor(y0+r*cell),Math.ceil(cell),Math.ceil(cell)); }
    }catch(e){ ctx.fillStyle='#ffffff';ctx.fillRect(x0,y0,size,size); } }
  function makePoster(){
    var W=750,H=1334,cv=document.createElement('canvas');cv.width=W;cv.height=H;var x=cv.getContext('2d');
    var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#e9fdff');g.addColorStop(.45,'#ffffff');g.addColorStop(1,'#eef9fb');x.fillStyle=g;x.fillRect(0,0,W,H);
    var glow=x.createRadialGradient(W*.18,120,10,W*.18,120,420);glow.addColorStop(0,'rgba(18,199,208,.35)');glow.addColorStop(1,'rgba(18,199,208,0)');x.fillStyle=glow;x.fillRect(0,0,W,H);
    var glow2=x.createRadialGradient(W*.9,H*.84,10,W*.9,H*.84,420);glow2.addColorStop(0,'rgba(11,94,183,.18)');glow2.addColorStop(1,'rgba(11,94,183,0)');x.fillStyle=glow2;x.fillRect(0,0,W,H);
    x.strokeStyle='rgba(18,183,199,.45)';x.lineWidth=2;x.strokeRect(28,28,W-56,H-56);
    x.textAlign='center';
    x.fillStyle='#0b5eb7';x.font='28px serif';x.fillText('另 一 种 人 生',W/2,108);
    x.fillStyle='#073a6f';x.font='bold 74px serif';x.fillText('人生 IF 线',W/2,196);
    x.fillStyle='#5d7b88';x.font='24px sans-serif';x.fillText(S.era.label+' · '+S.school.name+' · '+S.major.name,W/2,250);
    x.fillStyle='#12b7c7';x.fillText('· '+(S.outcome||'')+' ·',W/2,290);
    // 玩家自己的话
    var y=370;x.fillStyle='rgba(18,183,199,.2)';x.fillRect(70,y-44,W-140,2);
    x.fillStyle='#5d7b88';x.font='20px sans-serif';x.fillText('我想对此刻的自己说',W/2,y-12);
    x.fillStyle='#123646';x.font='30px serif';x.textAlign='left';
    var words=S.mine||'别怕选错，每条路上都有一个我在等你。';
    var endY=wrapText(x,'「'+words+'」',95,y+34,W-190,46);
    // 哲思
    var qy=endY+90;var q=pickQuote();
    x.textAlign='center';x.fillStyle='#0b5eb7';x.font='italic 27px serif';
    var qEnd=wrapText(x,q[0],110,qy,W-220,40);
    x.fillStyle='#5d7b88';x.font='20px sans-serif';x.fillText(q[1],W/2,qEnd+40);
    // 荐书
    var by=qEnd+110;x.fillStyle='rgba(18,183,199,.2)';x.fillRect(70,by-30,W-140,2);
    x.fillStyle='#5d7b88';x.font='20px sans-serif';x.fillText('送你一本书，陪你走过眼下',W/2,by);
    x.fillStyle='#123646';x.font='22px sans-serif';
    wrapText(x,pickBook(),95,by+40,W-190,34);
    // 二维码
    var qrSize=150,qx=(W-qrSize)/2,qy2=H-260;
    drawQR(x,GAME_URL,qx,qy2,qrSize);
    x.fillStyle='#5d7b88';x.font='20px sans-serif';x.textAlign='center';x.fillText('扫码，写下你的人生 IF 线',W/2,qy2+qrSize+50);
    try{ return cv.toDataURL('image/png'); }catch(e){ return null; }
  }
  function showPoster(){ var url=makePoster();
    if(url){ document.getElementById('poster-img').src=url; ov('ov-poster',true); }
    else toast('海报生成失败了，但你的人生真实发生过。');
  }

  /* ---------- overlays / toast / save ---------- */
  function ov(id,on){ document.getElementById(id).classList[on?'add':'remove']('active'); }
  function toast(msg){ var t=document.createElement('div');
    t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(255,255,255,.96);border:1px solid var(--line);color:var(--blue);padding:12px 20px;border-radius:30px;font-family:system-ui,sans-serif;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;max-width:80%;text-align:center;box-shadow:0 14px 34px rgba(7,58,111,.16);';
    t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';});
    setTimeout(function(){t.style.opacity='0';setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},350);},1900); }
  function saveLife(){ try{ localStorage.setItem('lifeif_last',JSON.stringify({era:S.era.label,school:S.school.name,major:S.major.name,outcome:S.outcome,when:Date.now()}));toast('已经把这一生存进了记忆里。'); }catch(e){ toast('这一次没能保存，但它发生过。'); } }

  /* ---------- actions ---------- */
  document.addEventListener('click',function(e){ var el=e.target.closest('[data-act]');if(!el)return;var act=el.getAttribute('data-act');
    if(act==='start'||act==='replay'){ ov('ov-poster',false);ov('ov-mine',false);startProfiling(); }
    else if(act==='save'){ saveLife(); }
    else if(act==='mine'){ document.getElementById('mine-text').value=S.mine||'';ov('ov-mine',true);setTimeout(function(){try{document.getElementById('mine-text').focus();}catch(x){}},150); }
    else if(act==='mine-cancel'){ ov('ov-mine',false); }
    else if(act==='mine-make'){ S.mine=(document.getElementById('mine-text').value||'').trim();ov('ov-mine',false);showPoster(); }
    else if(act==='poster-close'){ ov('ov-poster',false); }
  });
  document.getElementById('pick-next').addEventListener('click',function(){ if(!selectedSchool)return;
    if(selectedSchool===CUSTOM){ askCustomName(function(){S.school=CUSTOM;goMajor();}); } else { S.school=selectedSchool;goMajor(); } });

  function updateStatusTime(){
    var el=document.getElementById('lifeif-status-time');
    if(!el)return;
    var d=new Date(),h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0'),s=String(d.getSeconds()).padStart(2,'0');
    el.textContent=h+':'+m+':'+s;
  }
  updateStatusTime();
  setInterval(updateStatusTime,1000);
  window.addEventListener('load',function(){ startProfiling(); });
})();
</script>
</body></html>
